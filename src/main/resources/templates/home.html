<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('Home | Recipe Book')}" />
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"/>
<div class="container">
    <div class="hero-section">
        <div class="hero-content">
            <h1>Discover & Share <span class="highlight">Amazing</span> Recipes</h1>
            <p>Your digital cookbook for every occasion.</p>
            <div class="hero-stats">
                <span><strong th:text="${totalRecipes}">0</strong> Recipes</span>
                <span><strong th:text="${totalUsers}">0</strong> Cooks</span>
            </div>
        </div>
    </div>
    <section class="featured-recipes">
        <h2>Latest Recipes</h2>
        <div class="recipe-cards">
            <div th:each="recipe : ${recipes}" class="recipe-card"
                 th:onclick="|window.location.href='/recipes/' + ${recipe.id}|">

                <img th:src="${recipe.imageUrl}" th:alt="${recipe.title}">

                <h3 th:text="${recipe.title}">Recipe Title</h3>
                <div class="recipe-info">
                    <p th:text="'Time: ' + ${recipe.cookTime + recipe.prepTime} + ' min'">Time: 30 min</p>
                    <p class="category-tag" th:text="${recipe.primaryCategory.displayName}">Category</p>
                </div>
            </div>
        </div>
    </section>

    <section class="categories">
        <h2>Browse by Category</h2>
        <div class="category-circles">
            <a th:each="cat : ${T(recipes.recipeBook.entity.RecipeCategory).values()}"
               th:href="@{/recipes(category=${cat})}" class="category-circle">
                <div class="circle-content">
                    <span class="cat-name" th:text="${cat.displayName}">Category</span>
                </div>
            </a>
        </div>
    </section>
</div>
</body>
</html>
