<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: head('Page Not Found | Recipe Book')}"/>
  <link rel="stylesheet" th:href="@{/css/error.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="error-container">
  <div class="error-content">
    <i class="fa fa-compass error-icon"></i>
    <h1 th:text="${errorCode != null ? errorCode : '404'}"></h1>
    <h2>Oops! An error occurred.</h2>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a th:href="@{/home}" class="error-home-btn"><i class="fa fa-home"></i> Back to Home</a>
  </div>
</div>

</body>
</html>
