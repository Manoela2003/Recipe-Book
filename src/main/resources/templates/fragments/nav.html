<nav th:fragment="nav" xmlns:th="http://www.thymeleaf.org" class="navbar">
    <div class="nav-container">
        <h1 class="logo"><a th:href="@{/home}">Recipe Book</a></h1>

        <ul class="nav-links">
            <li><a th:href="@{/home}" th:classappend="${requestURI == '/home'} ? 'active' : ''">Home</a></li>
            <li><a th:href="@{/recipes}" th:classappend="${requestURI == '/recipes'} ? 'active' : ''">Recipes</a></li>
            <li><a th:href="@{/recipes/my-recipes}" th:classappend="${requestURI == '/recipes/my-recipes'} ? 'active' : ''">My Recipes</a></li>
            <li><a th:href="@{/recipes/add}" th:classappend="${requestURI == '/recipes/add'} ? 'active' : ''">Add Recipe</a></li>
        </ul>

        <div class="nav-right">
            <div class="nav-account" th:if="${#authorization.expression('isAuthenticated()')}">
                <span>Hello, <span th:text="${#authentication.name}">User</span></span>
                <a th:href="@{/logout}" class="logout-btn">Log Out</a>
            </div>

            <div class="nav-login" th:if="${#authorization.expression('!isAuthenticated()')}">
                <a th:href="@{/login}" class="login-btn">Log In</a>
            </div>
        </div>
    </div>
</nav>
